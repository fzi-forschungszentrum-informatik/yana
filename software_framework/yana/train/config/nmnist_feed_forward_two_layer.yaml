trainer_cfg:
  output_path: "./output/nmnist/feed_forward/"
  device_num: -1
  batch_size: 512
  num_epochs: 100
  num_workers: 4
  es_patience: 10
  checkpoint_path: null
  random_seed: 1

  dataset_cfg:
    dataset: "NMNIST"
    path: "datasets/"
    disk_cache: false

    num_samples: -1
    num_output_classes: 10
    train_split: 0.8

    transform_cfg:
      n_time_bins: 100
      time_window: 0
      spatial_factor: 2
      merge_polarities: false
      augmentation_enabled: false
      augmentation_transforms: {}

model_cfg:
  network_type: "custom_sequential_state"
  network_cfg:
    # Network architecture config
    layers:
      - type: "Flatten"
      - type: "Linear"
        params:
          in_features: network_input_features  # (= input_shape[-1])
          out_features: 50
          bias: false
      - type: "create_hidden_cell"
        params:
          neuron_type: "lif_quant"
          tau_inv_mem: 0.25
          threshold: 0.75
      - type: "Linear"
        params:
          in_features: null  # Automatically set to previous layer's out_features
          out_features: 50
          bias: false
      - type: "create_hidden_cell"
        params:
          neuron_type: "lif_quant"
          tau_inv_mem: 0.25
          threshold: 0.75
      - type: "Linear"
        params:
          in_features: null  # Automatically set to previous layer's out_features
          out_features: network_output_features  # (= num_output_classes)
          bias: false
      - type: "create_output_cell"
        params:
          neuron_type: "i_quant"
          tau_inv_mem: 0.0

    # Time Constant
    dt: 1.0

    # Weight initialization
    weight_init_enable: false
    weight_init_type: "custom"
    weight_init_gain: 1.0
    weight_init_gain_ramp: 1.0

  optimizer_cfg:
    optimizer: "Adam"
    loss: "nll"
    lr: 0.05
    lr_scheduler: "cosine"
    lr_scheduler_cfg:
      max_epoch: 20
    spikerate_target: 0.0
    spikerate_loss_coefficient: 0.0
    weight_decay: 0.0

  enable_tracking: false
  decoder_transforms: [
    "pick_last",    # Pick output of last time step
    "log_softmax"   # Logarithmic softmax
  ]

pruning_cfg:
  pruned_layers: [0, 1]
  scheduler_cfg:
    target_sparsity: 0.80
    increment: 0.20
    frequency: 2
