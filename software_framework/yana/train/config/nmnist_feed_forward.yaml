# All fields must exist. Even if not used by a specific network type. network_cfg only has to contain elements for this netwok

trainer_cfg:
  output_path: "./output/nmnist/"
  device_num: 0
  batch_size: 256
  num_epochs: 100
  es_patience: 5

  dataset_cfg:
    path: "datasets/"
    dataset: "NMNIST"

    num_samples: -1
    num_output_classes: 10
    train_split: 0.8
    random_seed: 1

    transform_cfg:
      n_time_bins: 100
      time_window: 0
      spatial_factor: 2
      merge_polarities: false

  checkpoint_path: null

model_cfg:
  network_type: "feed_forward"
  network_cfg:
    # Network architecture config
    hidden_features: 50
    dropout_low: 0.5
    dropout_high: 0.0
    bias: false
    # Neuron and quantization config
    neuron_type_hidden: lif_quant
    neuron_type_out: li_quant
    tau_inv_mem_hidden: 0.01
    tau_inv_mem_output: 0.001
    threshold: 0.01
    dt: 1.0
    quant_cfg.yaml: "yana/train/config/hardware/accelerator_quantization.yaml"

  optimizer_cfg:
    optimizer: "Adam"
    lr: 0.005
    lr_scheduling: false
    lr_scheduling_step_size: 10
    lr_scheduling_fac: 0.1
    spikerate_loss_coefficient: 0.0
    weight_decay: 0.0

hardware_cfg.yaml: "yana/train/config/hardware/accelerator_hardware.yaml"

pruning_cfg:
  iterative_pruning: false
  pruning_per_step: 0.1
  max_pruning: 0.5
  frequency: 1
  method: "magnitude"
  mode: "lin"
